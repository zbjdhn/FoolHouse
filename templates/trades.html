{% extends "layout.html" %}
{% set fh_page = "equity_list" %}

{% block content %}
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>交易列表</span>
          <div>
            <a href="{{ url_for('export_trades') }}" class="btn btn-sm btn-outline-success me-2">
              导出全部
            </a>
            <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-primary">新增交易</a>
          </div>
        </div>
        <div class="card-body">
          <div data-fh-table-state>
            <div class="mb-3 d-flex align-items-center gap-2">
              <input
                type="text"
                class="form-control"
                id="search-input"
                placeholder="搜索证券代码或证券名称..."
                autocomplete="off"
                style="max-width: 420px;"
              />
              <button type="button" class="btn btn-outline-secondary btn-sm" id="clear-search" style="display: none;">
                清除搜索
              </button>
              <span id="search-result-count" class="text-muted ms-2"></span>
            </div>
            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle" id="trades-table">
                <thead>
                  <tr>
                    <th>
                      成交日期
                      <button type="button" class="btn btn-link btn-sm p-0 ms-1 align-baseline" id="sort-date-asc" data-bs-toggle="tooltip" title="时间顺序">↑</button>
                      <button type="button" class="btn btn-link btn-sm p-0 ms-1 align-baseline" id="sort-date-desc" data-bs-toggle="tooltip" title="时间倒序">↓</button>
                    </th>
                    <th>证券代码</th>
                    <th>证券名称</th>
                    <th>买卖标志</th>
                    <th class="text-end">成交价格</th>
                    <th class="text-end">成交数量</th>
                    <th class="text-end">发生金额</th>
                    <th class="text-end">手续费</th>
                    <th class="text-center">操作</th>
                  </tr>
                </thead>
                <tbody id="trades-tbody"></tbody>
              </table>
            </div>
            <div id="no-results" class="alert alert-info" style="display: none;">
              没有找到匹配的交易记录。
            </div>
          </div>
          <div data-fh-empty-state class="text-muted mb-0" style="display:none;">
            暂时没有任何交易记录，请先新增一条交易。
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
