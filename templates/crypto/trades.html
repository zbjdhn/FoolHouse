{% extends "layout.html" %}
{% set fh_page = "crypto_list" %}
{% block content %}
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Crypto 交易列表</span>
          <div>
            {% if trades %}
              <a href="{{ url_for('crypto_export_trades') }}" class="btn btn-sm btn-outline-success me-2">
                导出全部
              </a>
              <button type="button" class="btn btn-sm btn-outline-danger me-2" data-bs-toggle="modal" data-bs-target="#clearDataModal">
                清除历史数据
              </button>
            {% endif %}
            <a href="{{ url_for('crypto_import_trades') }}" class="btn btn-sm btn-outline-secondary me-2">批量导入</a>
            <a href="{{ url_for('crypto_add') }}" class="btn btn-sm btn-outline-primary">新增交易</a>
          </div>
        </div>
        <div class="card-body">
          <div data-fh-table-state>
            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle" id="trades-table">
                <thead>
                  <tr>
                    <th>成交日期</th>
                    <th>代币代码</th>
                    <th>平台</th>
                    <th>买卖标志</th>
                    <th class="text-end">成交价格</th>
                    <th class="text-end">成交数量</th>
                    <th class="text-center">操作</th>
                  </tr>
                </thead>
                <tbody id="crypto-trades-tbody"></tbody>
              </table>
            </div>
          </div>
          <div data-fh-empty-state class="text-muted mb-0" style="display:none;">
            暂时没有任何交易记录，请先新增一条交易。
          </div>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
