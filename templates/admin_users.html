{% extends "layout.html" %}
{% block content %}
<div class="container py-4" style="max-width: 720px;">
  <div class="card mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">创建新用户</h5>
      {% if message %}
      <div class="alert alert-info">{{ message }}</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="op" value="create">
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label class="form-label">用户名</label>
            <input class="form-control" name="username" required>
          </div>
          <div class="col-md-5">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="col-md-2 form-check mt-4">
            <input class="form-check-input" type="checkbox" id="is_admin" name="is_admin">
            <label class="form-check-label" for="is_admin">管理员</label>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h5 class="card-title mb-3">用户列表</h5>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr>
              <th>用户名</th>
              <th>角色</th>
              <th class="text-center">重置密码</th>
              <th class="text-center">删除</th>
            </tr>
          </thead>
          <tbody>
            {% for u in users %}
            <tr>
              <td>{{ u.username }}</td>
              <td>{{ '管理员' if u.is_admin else '普通用户' }}</td>
              <td class="text-center">
                <button type="button" class="btn btn-sm btn-outline-primary" 
                        data-bs-toggle="modal" 
                        data-bs-target="#resetPwdModal" 
                        data-bs-username="{{ u.username }}">
                  修改
                </button>
              </td>
              <td class="text-center">
                <form method="post" onsubmit="return confirm('确定删除用户 {{ u.username }} 吗？');" class="d-inline">
                  <input type="hidden" name="op" value="delete">
                  <input type="hidden" name="username" value="{{ u.username }}">
                  <button type="submit" class="btn btn-sm btn-outline-danger" {% if u.username == session.get('user') %}disabled{% endif %}>删除</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 重置密码弹窗 -->
<div class="modal fade" id="resetPwdModal" tabindex="-1" aria-labelledby="resetPwdModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <form method="post">
        <div class="modal-header">
          <h5 class="modal-title" id="resetPwdModalLabel">重置密码</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" name="op" value="reset_pwd">
          <input type="hidden" name="username" id="reset_username_input">
          <div class="mb-3">
            <label class="form-label">用户：<span id="reset_username_display" class="fw-bold"></span></label>
          </div>
          <div class="mb-3">
            <label class="form-label">新密码</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">确认新密码</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="submit" class="btn btn-primary">提交修改</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const resetPwdModal = document.getElementById('resetPwdModal')
  if (resetPwdModal) {
    resetPwdModal.addEventListener('show.bs.modal', event => {
      const button = event.relatedTarget
      const username = button.getAttribute('data-bs-username')
      
      const usernameInput = resetPwdModal.querySelector('#reset_username_input')
      const usernameDisplay = resetPwdModal.querySelector('#reset_username_display')

      usernameInput.value = username
      usernameDisplay.textContent = username
    })
  }
</script>
{% endblock %}
